<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Surprise</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gift-overlay" id="giftOverlay">
    <div class="gift-box-btn" id="openGiftBtn">🎁</div>
    <div class="gift-text">Tap to open your surprise</div>
</div>

<canvas id="heartCanvas"></canvas>

<div class="main-stage" id="mainStage">
    <h1 class="neon-title">I Love You <span class="sub-name">Ammaadi</span></h1>

    <div id="gameBox">
        <p class="question-text">Do you love me too? 😉</p>
        <div class="btn-group">
            <button class="game-btn" id="yesBtn">YES! ❤️</button>
            <button class="game-btn" id="noBtn">No</button>
        </div>
    </div>

    <div class="success-message" id="successMsg">
        I knew it! No matter where life takes us, my favorite place in the entire world will always be right next to you. 🥰🏡❤️
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
